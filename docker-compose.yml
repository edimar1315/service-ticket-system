services:
  postgres:
    image: postgres:16-alpine
    container_name: sts-postgres
    environment:
      POSTGRES_DB: service_ticket
      POSTGRES_USER: sts
      POSTGRES_PASSWORD: sts_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sts -d service_ticket"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: sts-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sts
      RABBITMQ_DEFAULT_PASS: sts_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: sts-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: ServiceTicket.API/Dockerfile
    container_name: sts-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=service_ticket;Username=sts;Password=sts_password
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__Database: service_ticket
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: sts
      RabbitMQ__Password: sts_password
      Jwt__SecretKey: RoIacOX9VRKTzAvJ7KW3O5p1B9YoBE1M
      Jwt__Issuer: ServiceTicketAPI
      Jwt__Audience: ServiceTicketClients
      Jwt__ExpirationHours: "8"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ServiceTicket.Worker/Dockerfile
    container_name: sts-worker
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: sts
      RabbitMQ__Password: sts_password
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__Database: service_ticket
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: sts-frontend
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8081
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  mongo_data:
